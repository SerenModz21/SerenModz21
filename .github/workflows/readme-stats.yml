name: WakaTime Readme Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    if: github.repository_owner == 'SerenModz21' # shouldn't be running on forks
    name: Update Readme Stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@7b1140e6f537d6fb189a8022a531e986a89a5f3e # master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMIT_MESSAGE: "docs: update wakatime stats"
          SHOW_OS: "False"
          SHOW_LINES_OF_CODE: "True"
          SHOW_LOC_CHART: "False"
